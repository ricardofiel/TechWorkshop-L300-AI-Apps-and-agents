name: Deploy Handoff Service Agent

on:
  push:
    paths:
      - 'src/prompts/HandoffAgentPrompt.txt'
      - 'src/infra/agents/handoff-service.json'
      - '.github/workflows/deploy-handoff-service-agent.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy handoff-service agent to Foundry
        env:
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          GPT_DEPLOYMENT: ${{ secrets.GPT_DEPLOYMENT }}
        run: |
          # Read the prompt file and escape it for JSON
          INSTRUCTIONS=$(python3 -c "
          import json, sys
          with open('src/prompts/HandoffAgentPrompt.txt', 'r') as f:
              print(json.dumps(f.read()))
          ")

          # Build the request body from the template, substituting variables
          jq --arg model "$GPT_DEPLOYMENT" \
             --argjson instructions "$INSTRUCTIONS" \
             '.definition.model = $model | .definition.instructions = $instructions' \
             src/infra/agents/handoff-service.json > /tmp/agent-payload.json

          # Get token for the Foundry data plane
          TOKEN=$(az account get-access-token --resource "https://ai.azure.com" --query accessToken -o tsv)

          # Create/update the agent version via Foundry REST API
          curl -sf -X POST \
            "${FOUNDRY_ENDPOINT}/agents/handoff-service/versions?api-version=2025-11-15-preview" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/agent-payload.json

          echo "Handoff service agent deployed successfully."
